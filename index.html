// 处理锚点链接跳转（srcDoc iframe 中锚点链接默认行为不正确）
document.addEventListener('click', function(e) {
  var anchor = e.target.closest('a');
  if (anchor) {
    var href = anchor.getAttribute('href');
    if (href && href.startsWith('#')) {
      e.preventDefault();
      var targetId = href.slice(1);
      var target = document.getElementById(targetId);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }
});
</script>

        // --- Core Functions ---
        function rgbToXyz(r, g, b) {
            let _r = r / 255;
            let _g = g / 255;
            let _b = b / 255;

            _r = _r > 0.04045 ? Math.pow((_r + 0.055) / 1.055, 2.4) : _r / 12.92;
            _g = _g > 0.04045 ? Math.pow((_g + 0.055) / 1.055, 2.4) : _g / 12.92;
            _b = _b > 0.04045 ? Math.pow((_b + 0.055) / 1.055, 2.4) : _b / 12.92;

            _r *= 100;
            _g *= 100;
            _b *= 100;

            const x = _r * 0.4124564 + _g * 0.3575761 + _b * 0.1804375;
            const y = _r * 0.2126729 + _g * 0.7151522 + _b * 0.0721750;
            const z = _r * 0.0193339 + _g * 0.1191920 + _b * 0.9503041;

            return { x, y, z };
        }

        function xyzToLab(x, y, z) {
            const refX = 95.047;
            const refY = 100.000;
            const refZ = 108.883;

            let _x = x / refX;
            let _y = y / refY;
            let _z = z / refZ;

            _x = _x > 0.008856 ? Math.pow(_x, 1 / 3) : (7.787 * _x) + (16 / 116);
            _y = _y > 0.008856 ? Math.pow(_y, 1 / 3) : (7.787 * _y) + (16 / 116);
            _z = _z > 0.008856 ? Math.pow(_z, 1 / 3) : (7.787 * _z) + (16 / 116);

            const l = (116 * _y) - 16;
            const a = 500 * (_x - _y);
            const b = 200 * (_y - _z);

            return { l, a, b };
        }

        function rgbToLab(r, g, b) {
            const { x, y, z } = rgbToXyz(r, g, b);
            return xyzToLab(x, y, z);
        }

        function deltaE(lab1, lab2) {
            return Math.sqrt(
                Math.pow(lab1.l - lab2.l, 2) +
                Math.pow(lab1.a - lab2.a, 2) +
                Math.pow(lab1.b - lab2.b, 2)
            );
        }

        function getNearestColorName(rgb) {
            const targetLab = rgbToLab(rgb[0], rgb[1], rgb[2]);
            let minDistance = Infinity;
            let nearestName = "未知色";
            
            const r = rgb[0], g = rgb[1], b = rgb[2];
            const isGreenish = (g > r + 8) && (g > b + 8);

            for (let color of colorDict) {
                const colorLab = rgbToLab(color.rgb[0], color.rgb[1], color.rgb[2]);
                let d = deltaE(targetLab, colorLab);
                
                if (isGreenish) {
                    const cR = color.rgb[0], cG = color.rgb[1], cB = color.rgb[2];
                    const isColorGreenish = (cG > cR && cG > cB) || color.name.includes("绿");
                    if (!isColorGreenish) {
                        d += 20;
                    }
                }

                if (d < minDistance) {
                    minDistance = d;
                    nearestName = color.name;
                }
            }
            return nearestName;
        }

        function rgbToHex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        function averageColor(pixels) {
            if(pixels.length === 0) return [0,0,0];
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < pixels.length; i++) {
                r += pixels[i][0]; g += pixels[i][1]; b += pixels[i][2];
            }
            return [Math.round(r / pixels.length), Math.round(g / pixels.length), Math.round(b / pixels.length)];
        }

        function medianCut(pixels, depth) {
            if (depth === 0 || pixels.length === 0) {
                return pixels.length > 0 ? [averageColor(pixels)] : [];
            }
            if (pixels.length === 1) return [pixels[0]];
            
            let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
            for (let i = 0; i < pixels.length; i++) {
                const p = pixels[i];
                if (p[0] < minR) minR = p[0]; if (p[0] > maxR) maxR = p[0];
                if (p[1] < minG) minG = p[1]; if (p[1] > maxG) maxG = p[1];
                if (p[2] < minB) minB = p[2]; if (p[2] > maxB) maxB = p[2];
            }
            
            const rangeR = maxR - minR;
            const rangeG = maxG - minG;
            const rangeB = maxB - minB;
            
            if (rangeR === 0 && rangeG === 0 && rangeB === 0) {
                return [averageColor(pixels)];
            }
            
            let channelIndex = 0;
            if (rangeG >= rangeR && rangeG >= rangeB) channelIndex = 1;
            if (rangeB >= rangeR && rangeB >= rangeG) channelIndex = 2;
            
            pixels.sort((a, b) => a[channelIndex] - b[channelIndex]);
            const medianIndex = Math.floor(pixels.length / 2);
            
            const left = pixels.slice(0, medianIndex);
            const right = pixels.slice(medianIndex);
            
            return [...medianCut(left, depth - 1), ...medianCut(right, depth - 1)];
        }

        function extractColorsFromImage(imgElement) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const maxSize = 150; 
            let width = imgElement.width;
            let height = imgElement.height;
            
            if (width > height) {
                if (width > maxSize) { height *= maxSize / width; width = maxSize; }
            } else {
                if (height > maxSize) { width *= maxSize / height; height = maxSize; }
            }
            
            canvas.width = Math.floor(width);
            canvas.height = Math.floor(height);
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const pixels = [];
            
            for (let i = 0; i < data.length; i += 4) {
                if (data[i+3] > 128) {
                    pixels.push([data[i], data[i+1], data[i+2]]);
                }
            }
            
            let extracted = medianCut(pixels, 3);
            
            extracted.sort((a, b) => {
                const lumA = 0.299*a[0] + 0.587*a[1] + 0.114*a[2];
                const lumB = 0.299*b[0] + 0.587*b[1] + 0.114*b[2];
                return lumB - lumA;
            });
            
            return extracted;
        }

        // --- Emotion Logic ---
        const defaultEmotions = ['温暖', '宁静', '活力', '清新', '柔和', '明亮'];

        function getInitialEmotions(colors) {
            let avgR = 0, avgG = 0, avgB = 0;
            colors.forEach(c => { avgR += c[0]; avgG += c[1]; avgB += c[2]; });
            avgR /= colors.length; avgG /= colors.length; avgB /= colors.length;

            let emotions = [];
            if (avgR > 180 && avgG > 180 && avgB > 180) emotions.push("明亮", "清新");
            else if (avgR < 80 && avgG < 80 && avgB < 80) emotions.push("宁静");
            else if (avgR > avgG + 30 && avgR > avgB + 30) emotions.push("温暖", "活力");
            else if (avgB > avgR + 30 && avgB > avgG + 30) emotions.push("宁静", "清新");
            else if (avgG > avgR + 20 && avgG > avgB + 20) emotions.push("清新", "活力");
            else emotions.push("柔和");
            
            return [...new Set(emotions)];
        }

        function renderEmotionButtons() {
            const container = document.getElementById('emotion-buttons');
            container.innerHTML = defaultEmotions.map(emotion => {
                const isSelected = currentEmotions.includes(emotion);
                const btnClass = isSelected 
                    ? 'bg-apple-dark text-white border-apple-dark' 
                    : 'bg-white text-gray-500 hover:bg-gray-50 border-apple-border';
                return `<button onclick="toggleEmotion('${emotion}')" class="px-5 py-2.5 rounded-xl border text-sm font-light transition-colors ${btnClass} tracking-wide">${emotion}</button>`;
            }).join('');
            
            const customEmotions = currentEmotions.filter(e => !defaultEmotions.includes(e));
            container.innerHTML += customEmotions.map(emotion => {
                return `<button onclick="toggleEmotion('${emotion}')" class="px-5 py-2.5 rounded-xl border text-sm font-light transition-colors bg-apple-dark text-white border-apple-dark group relative flex items-center tracking-wide">

                </button>`;
            }).join('');
        }

        function toggleEmotion(emotion) {
            if (currentEmotions.includes(emotion)) {
                currentEmotions = currentEmotions.filter(e => e !== emotion);
            } else {
                currentEmotions.push(emotion);
            }
            renderEmotionButtons();
            renderEmotionTags();
        }

            const input = document.getElementById('custom-emotion-input');
            const val = input.value.trim();
            if (val && !currentEmotions.includes(val)) {

                input.value = '';

        function handleDrop(e) {

        function processFile(file) {
            if (!file.type.match('image.*')) {
                alert("请上传图片文件 (JPG/PNG/WEBP)");
                return;
            }
            
            const loading = document.getElementById('loading-overlay');
            loading.classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    setTimeout(() => {
                        const colors = extractColorsFromImage(img);
                        
                        currentImageData = e.target.result;
                        currentColors = colors;
                        currentEmotions = getInitialEmotions(colors);
                        
                        document.getElementById('preview-image').src = currentImageData;
                        renderColorCards(currentColors);
                        renderColorSchemes(currentColors);
                        renderEmotionButtons();
                        renderEmotionTags();
                        
                        loading.classList.add('hidden');
                        document.getElementById('upload-section').classList.add('hidden');
                        document.getElementById('result-section').classList.remove('hidden');
                    }, 400);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

            const animatedElements = container.querySelectorAll('.fade-in');
            animatedElements.forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
                el.style.animation = 'none';
            });

            setTimeout(() => {
                html2canvas(container, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: true,
                    foreignObjectRendering: false
                }).then(canvas => {
                    animatedElements.forEach(el => {
                        el.style.animation = '';
                    });
                    
                    const link = document.createElement('a');
                    link.download = '色彩提取记录.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    if(btn) {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                    }
                }).catch(err => {
                    console.error('Export failed:', err);
                    alert("导出失败，请重试");
                    if(btn) {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                    }
                });
            }, 300); 
        }

        // --- Library Functions ---
        function saveToLibrary() {
            if (currentColors.length === 0) return;
            
            // 压缩图片
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = currentImageData;
            
            // 等待图片加载
            img.onload = function() {
                const maxWidth = 600;
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedData = canvas.toDataURL('image/jpeg', 0.6);
                
                const record = {
                    id: Date.now(),
                    imageData: compressedData,
                    colors: [...currentColors],
                    emotions: [...currentEmotions],
                    date: new Date().toLocaleDateString('zh-CN')
                };
                
                colorLibrary.unshift(record);
                
                try {
                    localStorage.setItem('colorLibrary', JSON.stringify(colorLibrary));
                    showToast('已保存至收藏夹！');
                } catch(e) {
                    colorLibrary.shift(); // 回滚
                    console.error('保存失败:', e);
                    showToast('保存失败：' + (e.name === 'QuotaExceededError' ? '存储空间已满' : '请重试'));
                }
            };
        }

        function showToast(message) {
            const existing = document.getElementById('app-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.id = 'app-toast';
            toast.className = 'fixed top-12 left-1/2 transform -translate-x-1/2 bg-apple-dark text-white px-6 py-3 rounded-full shadow-lg z-[100] toast-enter flex items-center text-sm font-light tracking-wide';
            toast.innerHTML = `<i class="fa-regular fa-circle-check mr-2"></i>${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        function openLibraryModal() {
            const modal = document.getElementById('library-modal');
            const modalInner = modal.querySelector('div');
            renderLibrary();
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95');
                modalInner.classList.add('scale-100');
            }, 10);
        }

        function closeLibraryModal() {
            const modal = document.getElementById('library-modal');
            const modalInner = modal.querySelector('div');
            modal.classList.add('opacity-0');
            modalInner.classList.remove('scale-100');
            modalInner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function renderLibrary() {
            const grid = document.getElementById('library-grid');
            if (colorLibrary.length === 0) {
                grid.innerHTML = '<div class="text-center text-gray-400 py-20 w-full col-span-full"><i class="fa-regular fa-folder-open text-4xl mb-4 text-gray-300"></i><p class="font-light tracking-wide">收藏夹为空</p></div>';
                return;
            }
            
            grid.innerHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 w-full">' + colorLibrary.map(item => {
                const colorBars = item.colors.slice(0, 6).map(c => 
                    `<div class="flex-1 h-full" style="background-color: rgb(${c[0]},${c[1]},${c[2]})"></div>`
                ).join('');
                
                const tags = item.emotions.slice(0, 3).map(e => `<span class="px-2 py-1 bg-gray-50 text-gray-600 rounded-md text-xs border border-apple-border font-light tracking-wide">${e}</span>`).join('');
                const moreTags = item.emotions.length > 3 ? `<span class="px-2 py-1 bg-gray-50 text-gray-600 rounded-md text-xs border border-apple-border font-light tracking-wide">+${item.emotions.length-3}</span>` : '';
                
                return `
                    <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden border border-apple-border cursor-pointer group flex flex-col" onclick="loadFromLibrary(${item.id})">
                        <div class="h-40 overflow-hidden relative bg-gray-50">
                            <img src="${item.imageData}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out">
                            <button onclick="event.stopPropagation(); deleteFromLibrary(${item.id})" class="absolute top-3 right-3 w-8 h-8 bg-white/80 hover:bg-white text-gray-600 hover:text-red-500 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-sm backdrop-blur-md">
                                <i class="fa-regular fa-trash-can text-sm"></i>
                            </button>
                        </div>
                        <div class="h-12 flex w-full">
                            ${colorBars}
                        </div>
                        <div class="p-5 flex-grow flex flex-col justify-between bg-white">
                            <div class="flex gap-2 flex-wrap mb-4">
                                ${tags}${moreTags}
                            </div>
                            <div class="text-xs text-gray-400 flex items-center justify-between font-light">
                                <span>${item.date}</span>
                                <span class="text-apple-dark opacity-0 group-hover:opacity-100 transition-opacity flex items-center tracking-wide">加载 <i class="fa-solid fa-arrow-right ml-1 text-[10px]"></i></span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        function deleteFromLibrary(id) {
            colorLibrary = colorLibrary.filter(item => item.id !== id);
            try {
                localStorage.setItem('colorLibrary', JSON.stringify(colorLibrary));
            } catch(e) {}
            renderLibrary();
            showToast('已删除');
        }

        function loadFromLibrary(id) {
            const item = colorLibrary.find(i => i.id === id);
            if (!item) return;
            
            closeLibraryModal();
            
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            currentImageData = item.imageData;
            currentColors = [...item.colors];
            currentEmotions = [...item.emotions];
            
            document.getElementById('preview-image').src = currentImageData;
            renderColorCards(currentColors);
            renderColorSchemes(currentColors);
            renderEmotionTags();
            renderEmotionButtons();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadLibraryFromStorage() {
            try {
                const stored = localStorage.getItem('colorLibrary');
                colorLibrary = stored ? JSON.parse(stored) : [];
            } catch(e) {
                colorLibrary = [];
            }
        }

        let isDarkMode = false;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            try {
                localStorage.setItem('darkMode', isDarkMode);
            } catch(e) {}
            
            updateDarkModeButton();
        }

        function updateDarkModeButton() {
            const btn = document.getElementById('dark-mode-btn');
            if (isDarkMode) {
                btn.innerHTML = '<i class="fa-regular fa-sun"></i>';
            } else {
                btn.innerHTML = '<i class="fa-regular fa-moon"></i>';
            }
        }

        function loadDarkModePreference() {
            try {
                const saved = localStorage.getItem('darkMode');
                if (saved === 'true') {
                    isDarkMode = true;
                    document.body.classList.add('dark-mode');
                    updateDarkModeButton();
                }
            } catch(e) {}
        }

        // 立即执行，不等 DOMContentLoaded
        loadLibraryFromStorage();
        loadDarkModePreference();

        window.addEventListener('DOMContentLoaded', () => {
            // 页面加载完成后的其他初始化
        });
    </script>
</body>
</html>
